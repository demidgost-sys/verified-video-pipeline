name: Bug report
description: Report a reproducible failure using synthetic data only
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: >-
        Never attach real media, credentials, account identifiers, or private
        project state. Use the smallest synthetic reproducer.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Other or unsupported
    validations:
      required: true
  - type: textarea
    id: reproducer
    attributes:
      label: Synthetic reproducer
      description: Commands and minimal generated inputs only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected fail-closed behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: This report contains no real media, credentials, accounts, or private state.
          required: true
