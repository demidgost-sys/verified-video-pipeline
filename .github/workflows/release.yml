name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build, test, and package
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    outputs:
      artifact_id: ${{ steps.bundle.outputs['artifact-id'] }}
      source_commit: ${{ steps.release.outputs.source_commit }}
      source_ref: ${{ steps.release.outputs.source_ref }}
      tag: ${{ steps.release.outputs.tag }}
      tag_object: ${{ steps.release.outputs.tag_object }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Check out the exact tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/release.txt

      - name: Validate immutable release identity
        id: release
        run: |
          python scripts/prepare_release.py check \
            --tag "${GITHUB_REF_NAME}" \
            --source-ref "${GITHUB_REF}" \
            --expected-sha "${GITHUB_SHA}" \
            --main-ref refs/remotes/origin/main \
            --event-name "${GITHUB_EVENT_NAME}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Set the tagged source timestamp for packaging
        run: |
          epoch="$(git show -s --format=%ct "${{ steps.release.outputs.source_commit }}")"
          if [[ ! "${epoch}" =~ ^[0-9]+$ ]]; then
            echo "Invalid tag commit timestamp" >&2
            exit 1
          fi
          printf 'SOURCE_DATE_EPOCH=%s\n' "${epoch}" >> "${GITHUB_ENV}"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg

      - name: Install the hash-locked release toolchain
        run: |
          python -m pip install \
            --require-hashes \
            --only-binary=:all: \
            -r requirements/release.txt
          python -m pip install \
            --no-deps \
            --no-build-isolation \
            -e .

      - name: Audit the complete public tree and history
        run: python scripts/audit_public_tree.py

      - name: Compile source and tests
        run: python -m compileall -q src tests scripts

      - name: Check style
        run: |
          ruff check src tests scripts
          ruff format --check src tests scripts

      - name: Run the complete test suite
        run: python -m unittest discover -s tests -v

      - name: Revalidate source and history after tests
        run: |
          python scripts/audit_public_tree.py
          python scripts/prepare_release.py check \
            --tag "${GITHUB_REF_NAME}" \
            --source-ref "${GITHUB_REF}" \
            --expected-sha "${GITHUB_SHA}" \
            --main-ref refs/remotes/origin/main \
            --event-name "${GITHUB_EVENT_NAME}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}"

      - name: Build exact source archive and wheel
        run: |
          python scripts/prepare_release.py archive \
            --tag "${{ steps.release.outputs.tag }}" \
            --output-dir release
          python -m pip wheel . \
            --no-deps \
            --no-build-isolation \
            --wheel-dir release

      - name: Verify the wheel in a clean environment
        run: |
          shopt -s nullglob
          wheels=(release/*.whl)
          if [[ "${#wheels[@]}" -ne 1 ]]; then
            echo "Expected exactly one wheel" >&2
            exit 1
          fi
          python -m venv "${RUNNER_TEMP}/release-wheel-venv"
          "${RUNNER_TEMP}/release-wheel-venv/bin/python" -m pip install \
            --no-index --no-deps "${wheels[0]}"
          expected_version="${{ steps.release.outputs.version }}"
          cli_version="$(
            "${RUNNER_TEMP}/release-wheel-venv/bin/vvp" --version
          )"
          module_version="$(
            "${RUNNER_TEMP}/release-wheel-venv/bin/python" -c \
              'import verified_video_pipeline; print(verified_video_pipeline.__version__)'
          )"
          if [[ "${cli_version}" != "${expected_version}" ]] || \
             [[ "${module_version}" != "${expected_version}" ]]; then
            echo "Installed wheel version does not match the release tag" >&2
            exit 1
          fi
          "${RUNNER_TEMP}/release-wheel-venv/bin/vvp" doctor
          "${RUNNER_TEMP}/release-wheel-venv/bin/vvp" demo \
            "${RUNNER_TEMP}/release-wheel-demo"
          "${RUNNER_TEMP}/release-wheel-venv/bin/vvp" status \
            "${RUNNER_TEMP}/release-wheel-demo" --verify

      - name: Create canonical evidence and checksums
        run: |
          python scripts/prepare_release.py finalize \
            --tag "${{ steps.release.outputs.tag }}" \
            --source-ref "${{ steps.release.outputs.source_ref }}" \
            --source-commit "${{ steps.release.outputs.source_commit }}" \
            --tag-object "${{ steps.release.outputs.tag_object }}" \
            --release-dir release
          python scripts/prepare_release.py verify \
            --tag "${{ steps.release.outputs.tag }}" \
            --source-ref "${{ steps.release.outputs.source_ref }}" \
            --source-commit "${{ steps.release.outputs.source_commit }}" \
            --tag-object "${{ steps.release.outputs.tag_object }}" \
            --release-dir release
          (cd release && sha256sum --check --strict SHA256SUMS)

      - name: Upload the immutable release bundle
        id: bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets-${{ steps.release.outputs.version }}-${{ steps.release.outputs.source_commit }}
          path: |
            release/verified-video-pipeline-${{ steps.release.outputs.version }}.tar.gz
            release/verified_video_pipeline-${{ steps.release.outputs.version }}-py3-none-any.whl
            release/release-evidence.json
            release/SHA256SUMS
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
          overwrite: false
          include-hidden-files: false

  attest:
    name: Verify and attest
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Check out the exact tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.build.outputs.source_ref }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Revalidate the source identity without build dependencies
        id: identity
        run: |
          python3 scripts/prepare_release.py check \
            --tag "${{ needs.build.outputs.tag }}" \
            --source-ref "${{ needs.build.outputs.source_ref }}" \
            --expected-sha "${{ needs.build.outputs.source_commit }}" \
            --main-ref refs/remotes/origin/main \
            --event-name "${GITHUB_EVENT_NAME}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Require the exact build identity
        env:
          BUILD_COMMIT: ${{ needs.build.outputs.source_commit }}
          BUILD_TAG_OBJECT: ${{ needs.build.outputs.tag_object }}
          CHECKED_COMMIT: ${{ steps.identity.outputs.source_commit }}
          CHECKED_TAG_OBJECT: ${{ steps.identity.outputs.tag_object }}
        run: |
          if [[ "${CHECKED_COMMIT}" != "${BUILD_COMMIT}" ]] || \
             [[ "${CHECKED_TAG_OBJECT}" != "${BUILD_TAG_OBJECT}" ]]; then
            echo "Tagged source identity changed after packaging" >&2
            exit 1
          fi

      - name: Download the exact immutable bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.build.outputs.artifact_id }}
          path: ${{ runner.temp }}/release
          merge-multiple: true

      - name: Verify names, sizes, digests, evidence, and checksums
        run: |
          python3 scripts/prepare_release.py verify \
            --tag "${{ needs.build.outputs.tag }}" \
            --source-ref "${{ needs.build.outputs.source_ref }}" \
            --source-commit "${{ needs.build.outputs.source_commit }}" \
            --tag-object "${{ needs.build.outputs.tag_object }}" \
            --release-dir "${RUNNER_TEMP}/release"
          (cd "${RUNNER_TEMP}/release" && \
            sha256sum --check --strict SHA256SUMS)

      - name: Attest every verified release asset
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            ${{ runner.temp }}/release/verified-video-pipeline-${{ needs.build.outputs.version }}.tar.gz
            ${{ runner.temp }}/release/verified_video_pipeline-${{ needs.build.outputs.version }}-py3-none-any.whl
            ${{ runner.temp }}/release/release-evidence.json
            ${{ runner.temp }}/release/SHA256SUMS

  publish:
    name: Verify and publish
    needs:
      - build
      - attest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      attestations: read
    steps:
      - name: Download the exact attested bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.build.outputs.artifact_id }}
          path: release
          merge-multiple: true

      - name: Verify asset set, checksums, and evidence identity
        env:
          RELEASE_COMMIT: ${{ needs.build.outputs.source_commit }}
          RELEASE_REF: ${{ needs.build.outputs.source_ref }}
          RELEASE_TAG_OBJECT: ${{ needs.build.outputs.tag_object }}
          RELEASE_TAG: ${{ needs.build.outputs.tag }}
          RELEASE_VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_RUN_ATTEMPT}" != "1" ]]; then
            echo "Workflow reruns are forbidden" >&2
            exit 1
          fi
          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Release tag is not canonical stable SemVer" >&2
            exit 1
          fi
          if [[ "${RELEASE_VERSION}" != "${RELEASE_TAG#v}" ]] || \
             [[ "${RELEASE_REF}" != "refs/tags/${RELEASE_TAG}" ]] || \
             [[ "${GITHUB_REF}" != "${RELEASE_REF}" ]]; then
            echo "Release identity changed between jobs" >&2
            exit 1
          fi
          source="verified-video-pipeline-${RELEASE_VERSION}.tar.gz"
          wheel="verified_video_pipeline-${RELEASE_VERSION}-py3-none-any.whl"
          expected=("SHA256SUMS" "release-evidence.json" "${source}" "${wheel}")
          mapfile -t actual < <(
            find release -mindepth 1 -maxdepth 1 -printf '%f\n' | LC_ALL=C sort
          )
          if [[ "${actual[*]}" != "${expected[*]}" ]]; then
            echo "Release bundle contains an unexpected asset set" >&2
            exit 1
          fi
          (cd release && sha256sum --check --strict SHA256SUMS)
          if [[ "$(jq -cS . release/release-evidence.json)" != \
                "$(<release/release-evidence.json)" ]]; then
            echo "Release evidence is not canonical JSON" >&2
            exit 1
          fi
          jq -e \
            --arg commit "${RELEASE_COMMIT}" \
            --arg ref "${RELEASE_REF}" \
            --arg tag "${RELEASE_TAG}" \
            --arg tag_object "${RELEASE_TAG_OBJECT}" \
            --arg version "${RELEASE_VERSION}" \
            '.schema_version == 1 and
             .project == "verified-video-pipeline" and
             .tag == $tag and .version == $version and
             .source.commit == $commit and .source.ref == $ref and
             .source.tag_object == $tag_object and
             .source.tag_kind == "annotated" and
             .build.workflow == ".github/workflows/release.yml"' \
            release/release-evidence.json >/dev/null

      - name: Verify signed provenance for every asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ needs.build.outputs.source_commit }}
          RELEASE_REF: ${{ needs.build.outputs.source_ref }}
          RELEASE_VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          assets=(
            "release/verified-video-pipeline-${RELEASE_VERSION}.tar.gz"
            "release/verified_video_pipeline-${RELEASE_VERSION}-py3-none-any.whl"
            "release/release-evidence.json"
            "release/SHA256SUMS"
          )
          for asset in "${assets[@]}"; do
            gh attestation verify "${asset}" \
              --repo "${GITHUB_REPOSITORY}" \
              --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release.yml" \
              --signer-digest "${RELEASE_COMMIT}" \
              --source-ref "${RELEASE_REF}" \
              --source-digest "${RELEASE_COMMIT}" \
              --digest-alg sha256 \
              --deny-self-hosted-runners
          done

      - name: Revalidate the public tag control and create the release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ needs.build.outputs.source_commit }}
          RELEASE_TAG: ${{ needs.build.outputs.tag }}
          RELEASE_TAG_OBJECT: ${{ needs.build.outputs.tag_object }}
          RELEASE_VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          api_headers=(
            --header "Accept: application/vnd.github+json"
            --header "X-GitHub-Api-Version: 2026-03-10"
          )
          rulesets="$(
            gh api "${api_headers[@]}" --paginate --slurp \
              "repos/${GITHUB_REPOSITORY}/rulesets?includes_parents=false&per_page=100"
          )"
          matching_rulesets="$(
            jq '[.[][] | select(.name == "Immutable release tags")]' \
              <<<"${rulesets}"
          )"
          if [[ "$(jq 'length' <<<"${matching_rulesets}")" != "1" ]]; then
            echo "Expected one active Immutable release tags ruleset" >&2
            exit 1
          fi
          ruleset_id="$(jq -er '.[0].id' <<<"${matching_rulesets}")"
          ruleset="$(
            gh api "${api_headers[@]}" \
              "repos/${GITHUB_REPOSITORY}/rulesets/${ruleset_id}"
          )"
          jq -e '
            .name == "Immutable release tags" and
            .target == "tag" and
            .enforcement == "active" and
            .conditions.ref_name.include == ["refs/tags/v*.*.*"] and
            .conditions.ref_name.exclude == [] and
            ([.rules[].type] | sort) == ["deletion", "update"]
          ' <<<"${ruleset}" >/dev/null

          ref_payload="$(
            gh api "${api_headers[@]}" \
              "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}"
          )"
          if [[ "$(jq -r '.ref' <<<"${ref_payload}")" != \
                "refs/tags/${RELEASE_TAG}" ]] || \
             [[ "$(jq -r '.object.type' <<<"${ref_payload}")" != "tag" ]] || \
             [[ "$(jq -r '.object.sha' <<<"${ref_payload}")" != \
                "${RELEASE_TAG_OBJECT}" ]]; then
            echo "Remote tag ref is missing, lightweight, or moved" >&2
            exit 1
          fi
          tag_payload="$(
            gh api "${api_headers[@]}" \
              "repos/${GITHUB_REPOSITORY}/git/tags/${RELEASE_TAG_OBJECT}"
          )"
          if [[ "$(jq -r '.tag' <<<"${tag_payload}")" != "${RELEASE_TAG}" ]] || \
             [[ "$(jq -r '.object.type' <<<"${tag_payload}")" != "commit" ]] || \
             [[ "$(jq -r '.object.sha' <<<"${tag_payload}")" != \
                "${RELEASE_COMMIT}" ]]; then
            echo "Remote annotated tag no longer targets the attested commit" >&2
            exit 1
          fi
          if gh release view "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists; refusing to overwrite it" >&2
            exit 1
          fi
          gh release create "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --fail-on-no-commits \
            --generate-notes \
            --title "${RELEASE_TAG}" \
            "release/verified-video-pipeline-${RELEASE_VERSION}.tar.gz" \
            "release/verified_video_pipeline-${RELEASE_VERSION}-py3-none-any.whl" \
            "release/release-evidence.json" \
            "release/SHA256SUMS"
