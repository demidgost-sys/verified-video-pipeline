name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        python:
          - "3.11"
          - "3.14"
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install FFmpeg on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg

      - name: Install FFmpeg on macOS
        if: runner.os == 'macOS'
        run: brew list ffmpeg >/dev/null 2>&1 || brew install ffmpeg

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Audit public source tree
        run: python scripts/audit_public_tree.py

      - name: Compile source and tests
        run: python -m compileall -q src tests scripts

      - name: Check style
        run: |
          ruff check src tests scripts
          ruff format --check src tests scripts

      - name: Run test suite
        run: python -m unittest discover -s tests -v

      - name: Run standalone synthetic proof
        run: vvp demo "${RUNNER_TEMP}/verified-video-demo"

      - name: Build wheel without dependencies
        run: python -m pip wheel . --no-deps --wheel-dir dist

      - name: Install the built wheel in a clean environment
        run: |
          python -m venv "${RUNNER_TEMP}/wheel-venv"
          "${RUNNER_TEMP}/wheel-venv/bin/python" -m pip install dist/*.whl
          "${RUNNER_TEMP}/wheel-venv/bin/vvp" --version
